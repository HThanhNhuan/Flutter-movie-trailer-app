name: movie_app
description: "A new Flutter project."

# Ngăn không cho package này vô tình được publish lên pub.dev
publish_to: "none"

version: 1.0.0+1

environment:
  # Sử dụng ràng buộc SDK mới nhất từ cả hai nhánh để đảm bảo tương thích
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & UX
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  carousel_slider: ^4.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  palette_generator: ^0.3.3+3
  youtube_player_flutter: ^9.0.1

  # Network requests
  http: ^1.2.1

  # State management
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Database
  sqflite: ^2.3.3
  path: ^1.9.0 # path is a direct dependency for sqflite helper
  shared_preferences: ^2.2.3

  # Local Notifications
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  flutter_app_badger: ^1.5.0
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/logo.png
